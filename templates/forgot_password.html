<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | CareerPath AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
         :root {
            --primary-purple: #764ba2;
            --secondary-purple: #667eea;
        }
        
        body {
            background: linear-gradient(135deg, var(--secondary-purple) 0%, var(--primary-purple) 100%);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: white;
        }
        
        .reset-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.95) !important;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #212529 !important;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        
        .btn-reset {
            background: white;
            color: var(--primary-purple);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 800;
            width: 100%;
            text-transform: uppercase;
            margin-top: 1rem;
            transition: 0.3s;
        }
        
        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        .security-hint {
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #ffd700;
        }
    </style>
</head>

<body>
    <div class="reset-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold"><i class="fas fa-user-shield me-2"></i> Account Recovery</h2>
            <p class="small opacity-75">Verify your identity to reset password</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %} {% if messages %} {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2 text-center small border-0 shadow-sm mb-3">
            {{ message }}
        </div>
        {% endfor %} {% endif %} {% endwith %}

        <form action="{{ url_for('forgot_password') }}" method="POST">
            <div class="mb-3">
                <label class="small fw-bold mb-1">Registered Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
            </div>

            <div class="security-hint">
                <i class="fas fa-question-circle me-1"></i> <strong>Security Question:</strong> What is your high school name?
            </div>

            <div class="mb-3">
                <input type="text" name="security_answer" class="form-control" placeholder="Enter Secret Answer" required>
            </div>

            <hr class="my-4 opacity-25">

            <div class="mb-3">
                <label class="small fw-bold mb-1">New Password</label>
                <input type="password" name="new_password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="mb-3">
                <label class="small fw-bold mb-1">Confirm New Password</label>
                <input type="password" name="confirm_new_password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-reset">Update Password</button>
        </form>

        <div class="text-center mt-4">
            <a href="{{ url_for('login') }}" class="text-white small text-decoration-none"><i class="fas fa-arrow-left me-1"></i> Back to Login</a>
        </div>
    </div>
</body>

</html>
