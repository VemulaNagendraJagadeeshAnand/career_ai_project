<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Resume Screener | CareerPath AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
            display: flex;
        }
        
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #1e293b;
            position: fixed;
            padding: 2rem 1.5rem;
        }
        
        .nav-link-student {
            color: #94a3b8;
            padding: 12px 15px;
            border-radius: 8px;
            display: block;
            text-decoration: none;
            margin-bottom: 5px;
        }
        
        .nav-link-student.active {
            background: #334155;
            color: white;
        }
        
        .main-content {
            margin-left: 260px;
            width: 100%;
            padding: 3rem;
        }
        
        .card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        
        .skill-badge {
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            margin: 3px;
            display: inline-block;
        }
        
        .match {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        
        .miss {
            background: #fef9c3;
            color: #854d0e;
            border: 1px solid #fef08a;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h4 class="text-white fw-bold mb-5">CareerPath AI</h4>
        <nav>
            <a href="{{ url_for('student_dashboard') }}" class="nav-link-student"><i class="fas fa-home me-2"></i> Dashboard</a>
            <a href="{{ url_for('resume_screening') }}" class="nav-link-student active"><i class="fas fa-file-alt me-2"></i> Resume Screener</a>
            <a href="{{ url_for('career_guidance') }}" class="nav-link-student"><i class="fas fa-compass me-2"></i> Navigator</a>
        </nav>
    </div>
    <div class="main-content">
        <h2 class="fw-bold mb-4">AI Resume Screener</h2>
        <div class="card">
            <form action="{{ url_for('resume_screening') }}" method="POST" enctype="multipart/form-data">
                <label class="form-label fw-bold">Select Resume (PDF/DOCX)</label>
                <input type="file" name="resume" class="form-control mb-3" required>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Analyze Skills</button>
            </form>

            {% if result %}
            <div class="mt-5 pt-4 border-top">
                <div class="d-flex justify-content-between">
                    <h4>Best Match: <strong>{{ result.career }}</strong></h4>
                    <h3 class="text-primary">{{ result.ats_score }}%</h3>
                </div>
                <div class="row mt-4">
                    <div class="col-md-6">
                        <h6 class="text-success fw-bold small">MATCHED SKILLS</h6>
                        {% for m in result.matches %} <span class="skill-badge match">{{ m }}</span> {% endfor %}
                    </div>
                    <div class="col-md-6">
                        <h6 class="text-warning fw-bold small">MISSING SKILLS</h6>
                        {% for mis in result.missing %} <span class="skill-badge miss">{{ mis }}</span> {% endfor %}
                    </div>
                </div>
            </div>
            {% endif %}
        </div>
    </div>
</body>

</html>
