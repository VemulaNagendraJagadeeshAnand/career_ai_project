<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | CareerPath AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
         :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.2);
            --input-white: #ffffff;
            --text-dark: #1a1a1b;
        }
        
        body {
            background: var(--primary-gradient);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
        }
        
        .registration-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 28px;
            padding: 3.5rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            color: white;
            text-align: center;
        }
        
        .role-selector {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-around;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* HEAVYWEIGHT CSS FOR INPUT VISIBILITY */
        
        .form-control {
            background-color: var(--input-white) !important;
            border: 2px solid transparent !important;
            border-radius: 12px !important;
            padding: 14px 18px !important;
            margin-bottom: 18px !important;
            /* FORCED DARK TEXT COLORS */
            color: var(--text-dark) !important;
            -webkit-text-fill-color: var(--text-dark) !important;
            font-weight: 600 !important;
            font-size: 1rem !important;
        }
        
        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.3);
            border-color: #ffffff !important;
        }
        
        .form-control::placeholder {
            color: #718096 !important;
            -webkit-text-fill-color: #718096 !important;
            opacity: 1 !important;
        }
        
        .btn-register {
            background: #ffffff;
            color: #4a148c;
            font-weight: 800;
            border: none;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .btn-register:hover {
            transform: translateY(-2px);
            background: #f8f9fa;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
        }
        
        .login-link {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 0.95rem;
            margin-top: 20px;
            display: block;
            font-weight: 500;
        }
        
        .login-link:hover {
            color: #ffffff;
            text-decoration: underline;
        }
        /* Adaptive UI Transition */
        
        #interestSection {
            transition: all 0.3s ease-in-out;
            max-height: 100px;
            opacity: 1;
        }
    </style>
</head>

<body>

    <div class="registration-card">
        <h2 class="fw-bold mb-4">Create Account</h2>

        <form action="{{ url_for('register') }}" method="POST">
            <div class="role-selector">
                <div class="form-check form-check-inline m-0">
                    <input class="form-check-input" type="radio" name="role" id="studentRole" value="student" checked onchange="handleRoleChange()">
                    <label class="form-check-label" for="studentRole">Student</label>
                </div>
                <div class="form-check form-check-inline m-0">
                    <input class="form-check-input" type="radio" name="role" id="adminRole" value="admin" onchange="handleRoleChange()">
                    <label class="form-check-label" for="adminRole">Admin</label>
                </div>
            </div>

            <input type="text" name="username" class="form-control" placeholder="Username" required autocomplete="off">
            <input type="email" name="email" class="form-control" placeholder="Email Address" required autocomplete="off">

            <input type="password" name="password" class="form-control" placeholder="Password" required>

            <div id="interestSection">
                <select name="interest" class="form-control">
                    <option value="" disabled selected>Select Primary Interest</option>
                    <option value="Java Developer">Java Developer</option>
                    <option value="Data Scientist">Data Scientist</option>
                    <option value="Web Developer">Web Developer</option>
                    <option value="AI Engineer">AI Engineer</option>
                    <option value="Cloud Engineer">Cloud Engineer</option>
                </select>
            </div>

            <button type="submit" class="btn-register mt-2">Register Now</button>

            <a href="{{ url_for('login') }}" class="login-link">Already have an account? Login</a>
        </form>
    </div>

    <script>
        function handleRoleChange() {
            const interestSection = document.getElementById('interestSection');
            const isAdmin = document.getElementById('adminRole').checked;

            if (isAdmin) {
                interestSection.style.display = 'none';
                // Reset select value when hidden
                interestSection.querySelector('select').selectedIndex = 0;
            } else {
                interestSection.style.display = 'block';
            }
        }

        // Initial check on load
        window.onload = handleRoleChange;
    </script>
</body>

</html>
