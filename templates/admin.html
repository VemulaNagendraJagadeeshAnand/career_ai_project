<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - CareerPath AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
         :root {
            --admin-primary: #4a148c;
            --admin-bg: #f4f7f6;
            --sidebar-width: 260px;
        }
        
        body {
            background: var(--admin-bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
        }
        /* Admin Sidebar */
        
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--admin-primary);
            color: white;
            padding: 2.5rem 1.5rem;
            position: fixed;
        }
        
        .main-content {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            padding: 3rem;
        }
        /* Glass Cards */
        
        .glass-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
            transition: 0.3s;
        }
        
        .glass-card:hover {
            transform: translateY(-5px);
        }
        
        .nav-link-admin {
            color: rgba(255, 255, 255, 0.8);
            padding: 12px;
            border-radius: 12px;
            display: block;
            text-decoration: none;
            margin-bottom: 10px;
        }
        
        .nav-link-admin.active,
        .nav-link-admin:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h4 class="fw-bold mb-5"><i class="fas fa-user-shield me-2"></i> Admin Panel</h4>
        <nav>
            <a href="{{ url_for('admin') }}" class="nav-link-admin active"><i class="fas fa-chart-line me-2"></i> System Insights</a>
            <a href="{{ url_for('admin_bulk_screen') }}" class="nav-link-admin"><i class="fas fa-layer-group me-2"></i> Batch Screening</a>
            <hr class="opacity-25 my-4">
            <a href="{{ url_for('logout') }}" class="nav-link-admin text-danger fw-bold"><i class="fas fa-power-off me-2"></i> Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="fw-bold m-0">System Analytics</h2>
            <span class="badge bg-success py-2 px-3 rounded-pill shadow-sm"><i class="fas fa-database me-1"></i> MongoDB Live</span>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="glass-card text-center">
                    <div class="stat-icon bg-primary text-white mx-auto"><i class="fas fa-users"></i></div>
                    <small class="text-muted fw-bold">TOTAL STUDENTS</small>
                    <h2 class="fw-bold m-0">{{ analytics["users"] }}</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card text-center">
                    <div class="stat-icon bg-success text-white mx-auto"><i class="fas fa-file-alt"></i></div>
                    <small class="text-muted fw-bold">TOTAL SCREENINGS</small>
                    <h2 class="fw-bold m-0">{{ analytics["resumes"] }}</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card text-center border-top border-warning border-4">
                    <div class="stat-icon bg-warning text-dark mx-auto"><i class="fas fa-fire"></i></div>
                    <small class="text-muted fw-bold">TRENDING FIELD</small>
                    <h5 class="fw-bold m-0 text-primary">{{ top_career }}</h5>
                </div>
            </div>
        </div>

        <div class="glass-card">
            <h5 class="fw-bold mb-4 text-center">Career Recommendation Distribution</h5>
            <div style="height: 350px;">
                <canvas id="careerChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('careerChart').getContext('2d');
        const labels = {
            {
                career_labels | tojson
            }
        };
        const values = {
            {
                career_values | tojson
            }
        };

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Recommended Students',
                    data: values,
                    backgroundColor: 'rgba(74, 20, 140, 0.7)',
                    borderColor: '#4a148c',
                    borderWidth: 1,
                    borderRadius: 10
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            stepSize: 1
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });
    </script>
</body>

</html>
