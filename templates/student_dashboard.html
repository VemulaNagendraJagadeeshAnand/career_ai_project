<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | CareerPath AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
         :root {
            --primary-color: #4f46e5;
            /* Indigo */
            --bg-light: #f8fafc;
            --sidebar-bg: #1e293b;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        
        body {
            background-color: var(--bg-light);
            color: #1e293b;
            font-family: 'Inter', sans-serif;
            display: flex;
        }
        
        .sidebar {
            width: 260px;
            height: 100vh;
            background: var(--sidebar-bg);
            position: fixed;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
        }
        
        .nav-link-student {
            color: #94a3b8;
            padding: 12px 15px;
            border-radius: 8px;
            display: block;
            text-decoration: none;
            margin-bottom: 5px;
        }
        
        .nav-link-student:hover,
        .nav-link-student.active {
            background: #334155;
            color: white;
        }
        
        .main-content {
            margin-left: 260px;
            width: 100%;
            padding: 2.5rem;
        }
        
        .card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .btn-primary {
            background: var(--primary-color);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
        }
        
        .badge-ats {
            background: #dcfce7;
            color: #166534;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h4 class="text-white fw-bold mb-5">CareerPath <span class="text-info">AI</span></h4>
        <nav class="flex-grow-1">
            <a href="{{ url_for('student_dashboard') }}" class="nav-link-student active"><i class="fas fa-home me-2"></i> Dashboard</a>
            <a href="{{ url_for('resume_screening') }}" class="nav-link-student"><i class="fas fa-file-alt me-2"></i> Resume Screener</a>
            <a href="{{ url_for('career_guidance') }}" class="nav-link-student"><i class="fas fa-compass me-2"></i> Navigator</a>
        </nav>
        <a href="{{ url_for('logout') }}" class="nav-link-student text-danger mt-auto"><i class="fas fa-power-off me-2"></i> Logout</a>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Student Dashboard</h2>
            <div class="text-end">
                <span class="fw-bold">{{ user.username }}</span><br>
                <small class="text-muted">{{ user.email }}</small>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card text-center">
                    <img src="https://ui-avatars.com/api/?name={{ user.username }}&background=4f46e5&color=fff" class="rounded-circle mx-auto mb-3" width="80">
                    <h5>{{ user.interest }}</h5>
                    <p class="text-muted small">Primary Interest</p>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card">
                    <h5 class="fw-bold mb-3">Recent Activity</h5>
                    <table class="table table-borderless">
                        <thead class="table-light">
                            <tr>
                                <th>Date</th>
                                <th>Career Match</th>
                                <th>Score</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for entry in history|reverse %}
                            <tr>
                                <td>{{ entry.timestamp }}</td>
                                <td><strong>{{ entry.career }}</strong></td>
                                <td><span class="badge-ats">{{ entry.ats }}%</span></td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
