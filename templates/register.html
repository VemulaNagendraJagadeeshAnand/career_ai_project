<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CareerPath AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .register-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white !important;
        }
        
        .btn-register {
            background: white;
            color: #764ba2;
            font-weight: bold;
            width: 100%;
            border-radius: 10px;
            padding: 10px;
        }
        
        .role-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <div class="register-card">
        <h3 class="text-center mb-4">Create Account</h3>
        <form action="{{ url_for('register') }}" method="POST">

            <div class="role-box d-flex justify-content-around">
                <div>
                    <input type="radio" name="role" id="reg-student" value="student" checked>
                    <label for="reg-student">Student</label>
                </div>
                <div>
                    <input type="radio" name="role" id="reg-admin" value="admin">
                    <label for="reg-admin">Admin</label>
                </div>
            </div>

            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email Address" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <div class="mb-3">
                <select name="interest" class="form-control">
                    <option value="Java Developer">Java Developer</option>
                    <option value="Web Developer">Web Developer</option>
                    <option value="Data Scientist">Data Scientist</option>
                </select>
            </div>

            <button type="submit" class="btn btn-register">Register Now</button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('login') }}" class="text-white small">Already have an account? Login</a>
        </div>
    </div>

</body>

</html>
