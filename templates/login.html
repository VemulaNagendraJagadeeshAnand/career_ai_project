<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CareerPath AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
         :root {
            --primary-purple: #764ba2;
            --secondary-purple: #667eea;
        }
        
        body {
            background: linear-gradient(135deg, var(--secondary-purple) 0%, var(--primary-purple) 100%);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: white;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        
        .role-switcher {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50px;
            padding: 5px;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .role-switcher input[type="radio"] {
            display: none;
        }
        
        .role-switcher label {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .role-switcher input[type="radio"]:checked+label {
            background: white;
            color: var(--primary-purple);
        }
        
        .pass-group {
            position: relative;
        }
        
        .toggle-icon {
            position: absolute;
            right: 15px;
            top: 42px;
            color: #718096;
            cursor: pointer;
            z-index: 10;
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.95) !important;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #212529 !important;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        
        .btn-login {
            background: white;
            color: var(--primary-purple);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 800;
            width: 100%;
            text-transform: uppercase;
            margin-top: 1.5rem;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            background: #f8f9fa;
        }
        
        .forgot-link {
            text-decoration: none;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
            transition: 0.3s;
        }
        
        .forgot-link:hover {
            color: white;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold"><i class="fas fa-lock me-2"></i> Login Portal</h2>
            <p class="small opacity-75">Welcome back to CareerPath AI</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %} {% if messages %} {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show text-center py-2 border-0 shadow-sm" role="alert">
            <small class="fw-bold">{{ message }}</small>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %} {% endif %} {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="role-switcher">
                <input type="radio" name="role" id="student" value="student" checked>
                <label for="student">STUDENT</label>
                <input type="radio" name="role" id="admin" value="admin">
                <label for="admin">ADMIN</label>
            </div>

            <div class="mb-3">
                <label class="small fw-bold mb-1">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
            </div>

            <div class="mb-2 pass-group">
                <label class="small fw-bold mb-1">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                <i class="fas fa-eye toggle-icon" onclick="togglePass()"></i>
            </div>

            <div class="text-end">
                <a href="{{ url_for('forgot_password') }}" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-login">Access Portal</button>
        </form>

        <div class="text-center mt-4 small">
            New candidate? <a href="{{ url_for('register') }}" class="text-white fw-bold text-decoration-none">Join Now</a>
        </div>
    </div>

    <script>
        function togglePass() {
            const passInput = document.getElementById('password');
            const icon = event.target;
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>

</html>
