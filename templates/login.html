<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CareerPath AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
         :root {
            --primary-purple: #764ba2;
            --secondary-purple: #667eea;
        }
        
        body {
            background: linear-gradient(135deg, var(--secondary-purple) 0%, var(--primary-purple) 100%);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: white;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        
        .role-switcher {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50px;
            padding: 5px;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .role-switcher input[type="radio"] {
            display: none;
        }
        
        .role-switcher label {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .role-switcher input[type="radio"]:checked+label {
            background: white;
            color: var(--primary-purple);
        }
        /* CRITICAL FIX: Forces dark text for ALL inputs */
        
        .form-control {
            background: rgba(255, 255, 255, 0.95) !important;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #212529 !important;
            /* Deep dark grey for visibility */
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 1rem;
        }
        /* Ensures text stays dark even when clicked */
        
        .form-control:focus {
            background: #ffffff !important;
            color: #000000 !important;
            box-shadow: 0 0 0 0.25rem rgba(255, 255, 255, 0.2);
            outline: none;
        }
        
        .form-control::placeholder {
            color: #6c757d !important;
        }
        
        .btn-login {
            background: white;
            color: var(--primary-purple);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 800;
            width: 100%;
            text-transform: uppercase;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold"><i class="fas fa-fingerprint me-2"></i> CareerPath AI</h2>
            <p class="small opacity-75">Sign in to your portal</p>
        </div>

        {% if error %}
        <div class="alert alert-danger py-2 small text-center" style="border-radius: 10px;">
            {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="role-switcher">
                <input type="radio" name="role" id="student" value="student" checked>
                <label for="student">STUDENT</label>
                <input type="radio" name="role" id="admin" value="admin">
                <label for="admin">ADMIN</label>
            </div>

            <div class="mb-3">
                <label class="small fw-bold mb-1">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
            </div>

            <div class="mb-3">
                <label class="small fw-bold mb-1">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-login">Access Portal</button>
        </form>

        <div class="text-center mt-4 small">
            New candidate? <a href="{{ url_for('register') }}" class="text-white fw-bold">Join Now</a>
        </div>
    </div>
</body>

</html>
